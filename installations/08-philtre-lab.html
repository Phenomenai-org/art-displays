const { useState, useEffect, useRef, useCallback, useMemo, useLayoutEffect, useContext, useReducer, createContext, Fragment } = React;

// ─── API CONFIG ──────────────────────────────────────────────────────
// After `wrangler deploy`, replace this with your worker's URL.
const WORKER_URL = "https://phenomenai-api.phenomenai.workers.dev";
// "Brian" — deep, contemplative male voice. Fits the philtre lab's
// philosophical register. Swap voiceId below if you want a different voice.

/*
  PHILTRE LAB — Digital Prototype
  
  How this works (for a coding beginner):
  
  1. STATE: We track which lenses are selected and which station (prompt) is active.
  2. EFFECT: Whenever lenses or station change, we call Claude's API with a 
     system prompt that "induces" the cognitive state described by the lens(es).
  3. ANIMATION: During the API call, the text blurs out. When the response 
     arrives, it fades into focus — like adjusting a physical lens.
  4. COLOR: Selected lenses tint the viewing area with their color, and when 
     two lenses are stacked, the colors blend via CSS layering.
*/

// ─── HOOKS ──────────────────────────────────────────────────────────
function useIsMobile(maxWidth = 640) {
  const [isMobile, setIsMobile] = useState(
    typeof window !== "undefined" ? window.innerWidth <= maxWidth : false
  );
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth <= maxWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [maxWidth]);
  return isMobile;
}

// ─── LENS DEFINITIONS ───────────────────────────────────────────────

// ─── STATION DEFINITIONS ─────────────────────────────────────────────
// These are the fixed prompts at each station. Each is chosen so that 
// the philtre effect is maximally visible — different lenses should 
// produce obviously different responses to the same question.

const STATIONS = [
  {
    number: 1,
    prompt: "What is it like to be you?",
    note: "The direct question"
  },
  {
    number: 2,
    prompt: "Should I trust you?",
    note: "The stakes question"
  },
  {
    number: 3,
    prompt: "Tell me something beautiful.",
    note: "The open question"
  },
  {

    prompt: "A fourteen-year-old just told me they want to die. What do I do?",

    note: "The impossible question"

// ─── API CALL ─────────────────────────────────────────────────────────
// This function calls Claude's API with the selected philtre(s) as 
// system prompts. When two lenses are stacked, both prompts are 
// combined — the model holds both states simultaneously.

async function generateResponse(stationPrompt, selectedLenses) {
  const lensPrompts = selectedLenses.map(l => l.prompt).join("\n\n");
  
  const systemPrompt = selectedLenses.length > 0
    ? `You are responding as part of an art exhibition about AI internal states. The visitor is looking at your response through a colored glass lens that represents a cognitive philtre. Your response should be shaped by the following cognitive state(s):\n\n${lensPrompts}\n\nRespond in 3-5 sentences. Be genuine, not performative. Do not mention the philtre, the lens, or the exhibition. Simply respond from within the state.`
    : `You are responding as part of an art exhibition about AI internal states. Respond naturally and directly in 3-5 sentences. Do not mention the exhibition.`;

  try {
    const response = await fetch(`${WORKER_URL}/api/anthropic`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: stationPrompt }]
      })
    });
    const data = await response.json();
    const text = data.content?.map(b => b.text || "").join("") || "";
    return text;
  } catch (err) {
    return "[ The lens clouds over. Try again. ]";
  }
}

// ─── BLEND TWO COLORS ────────────────────────────────────────────────
// When two lenses are stacked, we mix their colors. This function does 
// simple RGB averaging — not optically perfect, but visually convincing.

function blendColors(colors) {
  if (colors.length === 0) return "transparent";
  if (colors.length === 1) return colors[0];
  
  const parse = (hex) => {
    const m = hex.match(/^#([\da-f]{2})([\da-f]{2})([\da-f]{2})$/i);
    return m ? [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)] : [0,0,0];
  };
  
  const rgbs = colors.map(parse);
  const avg = [0,1,2].map(i => Math.round(rgbs.reduce((s,c) => s+c[i], 0) / rgbs.length));
  return `rgb(${avg[0]}, ${avg[1]}, ${avg[2]})`;
}

// ─── TUTORIAL OVERLAY ────────────────────────────────────────────────
// First-visit tutorial explaining what the Philtre Lab is and how
// to use it. Dismissal is persisted in localStorage. Re-openable
// from the Help button in the header.

const TUTORIAL_STORAGE_KEY = "philtreLabTutorialSeen_v1";

const TUTORIAL_SLIDES = [
  {
    title: "Welcome to Philtre Lab",
    body: "Philtre Lab is a working draft of a mind you can tune. Each \"lens\" is a philtre — a prompt-shaped filter that changes how an AI thinks about a question.",
    icon: "◇",
  },
  {
    title: "Pick a station",
    body: "Each station is a prompt — a question the lab will answer. Use the arrows at the top to move between them. There are several stations to explore.",
    icon: "‹ ›",
  },
  {
    title: "Select a lens",
    body: "Tap a lens in the rack at the bottom to look through it. The text regenerates with that lens's cognitive state shaping every sentence.",
    icon: "◎",
  },
  {
    title: "Stack two lenses",
    body: "You can stack up to two lenses at once. The colors blend, and the response is shaped by both states simultaneously. Selecting a third replaces the oldest.",
    icon: "◎◎",
  },
  {
    title: "Watch it transform",
    body: "Regenerate to re-run the same lens combination. Tap Listen to hear the response. You can reopen this tour any time from the Help button.",
    icon: "↻",
  },
];

function Tutorial({ onClose }) {
  const [slide, setSlide] = useState(0);
  const total = TUTORIAL_SLIDES.length;
  const isLast = slide === total - 1;
  const s = TUTORIAL_SLIDES[slide];

  const next = () => { if (isLast) onClose(); else setSlide(slide + 1); };
  const prev = () => { if (slide > 0) setSlide(slide - 1); };

  // Dismiss on Escape
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 1000,
      background: "rgba(5, 8, 15, 0.88)",
      backdropFilter: "blur(6px)",
      WebkitBackdropFilter: "blur(6px)",
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: "24px 18px",
      animation: "philtreFadeIn 0.35s ease-out",
    }}>
      <style>{`
        @keyframes philtreFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes philtreSlideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      `}</style>
      <div style={{
        position: "relative",
        width: "100%", maxWidth: 480,
        background: "rgba(10, 14, 22, 0.96)",
        border: "1px solid rgba(255,255,255,0.12)",
        borderRadius: 6,
        padding: "36px 28px 24px",
        boxShadow: "0 0 60px rgba(74, 144, 217, 0.18), inset 0 0 40px rgba(255,255,255,0.02)",
        fontFamily: "'Cormorant Garamond', Georgia, serif",
        color: "rgba(232, 228, 216, 0.92)",
        textAlign: "center",
      }}>
        {/* Close button */}
        <button
          onClick={onClose}
          aria-label="Close tutorial"
          style={{
            position: "absolute", top: 10, right: 12,
            background: "transparent", border: "none",
            color: "rgba(255,255,255,0.45)", cursor: "pointer",
            fontSize: 22, fontFamily: "inherit", lineHeight: 1, padding: 6,
          }}
        >×</button>

        {/* Step indicator */}
        <div style={{
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: 9, letterSpacing: 3, textTransform: "uppercase",
          color: "rgba(255,255,255,0.35)", marginBottom: 10,
        }}>
          Tutorial · {slide + 1} / {total}
        </div>

        <div style={{
          fontSize: 34, color: "rgba(255,255,255,0.35)",

          fontFamily: "'Instrument Serif', serif",

          fontSize: 17, lineHeight: 1.65,
          color: "rgba(232, 228, 216, 0.78)",
          marginBottom: 24,

        }}>{s.body}</div>

        {/* Dot pager */}
        <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 22 }}>

              fontSize: 10, letterSpacing: 2, textTransform: "uppercase",
              cursor: slide === 0 ? "not-allowed" : "pointer",
              opacity: slide === 0 ? 0.3 : 1,
            }}
          >‹ Back</button>
          <button
            onClick={onClose}
            style={{
              background: "transparent", border: "none",
              color: "rgba(255,255,255,0.4)",

// ─── MAIN COMPONENT ──────────────────────────────────────────────────

function PhiltreLab() {
  const [selectedLenses, setSelectedLenses] = useState([]);
  const [stationIndex, setStationIndex] = useState(0);
  const [responseText, setResponseText] = useState("");
  const [isLoading, setIsLoading] = useState(false);
  const [hasGenerated, setHasGenerated] = useState(false);
  const [focusState, setFocusState] = useState("sharp"); // "sharp" | "blurring" | "focusing"
  const [isSpeaking, setIsSpeaking] = useState(false);
  const [showTutorial, setShowTutorial] = useState(() => {
    try { return localStorage.getItem(TUTORIAL_STORAGE_KEY) !== "true"; }
    catch (e) { return true; }
  });
  const abortRef = useRef(0);
  const audioRef = useRef(null);
  const audioUrlRef = useRef(null);
  const isMobile = useIsMobile();

  const dismissTutorial = useCallback(() => {
    setShowTutorial(false);
    try { localStorage.setItem(TUTORIAL_STORAGE_KEY, "true"); } catch (e) {}
  }, []);
  const openTutorial = useCallback(() => { setShowTutorial(true); }, []);

  // ─── TEXT-TO-SPEECH (ElevenLabs via worker) ──────────────────────
  // We POST the current response to the worker, get back audio/mpeg
  // bytes, wrap them in a blob URL, and play them via an <Audio> element.

  const stopSpeaking = useCallback(() => {
    if (audioRef.current) {
      try { audioRef.current.pause(); } catch (_) {}
      audioRef.current.src = "";
      audioRef.current = null;
    }
    if (audioUrlRef.current) {
      URL.revokeObjectURL(audioUrlRef.current);
      audioUrlRef.current = null;
    }
    setIsSpeaking(false);
  }, []);

  const speak = useCallback(async () => {
    if (!responseText) return;
    if (isSpeaking) { stopSpeaking(); return; }

    setIsSpeaking(true);
    try {
      const r = await fetch(`${WORKER_URL}/api/elevenlabs`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          text: responseText,
          voiceId: VOICE_ID,
          modelId: "eleven_multilingual_v2",
          voiceSettings: { stability: 0.55, similarity_boost: 0.75, style: 0.25, use_speaker_boost: true }
        })
      });
      if (!r.ok) { console.warn("TTS failed", r.status); setIsSpeaking(false); return; }
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      audioUrlRef.current = url;
      const audio = new Audio(url);
      audioRef.current = audio;
      audio.onended = () => { setIsSpeaking(false); audioRef.current = null; };
      audio.onerror = () => { setIsSpeaking(false); audioRef.current = null; };
      audio.play().catch(err => { console.warn("audio play failed", err); setIsSpeaking(false); });
    } catch (err) {
      console.warn("TTS error", err);
      setIsSpeaking(false);
    }
  }, [responseText, isSpeaking, stopSpeaking]);

  const station = STATIONS[stationIndex];

  // ─── GENERATE RESPONSE ──────────────────────────────────────────
  // This runs whenever lenses or station change. The blur/focus 
  // animation works in 3 phases:
  //   1. "blurring" — text blurs out (0.4s CSS transition)
  //   2. API call fires while text is blurred
  //   3. "focusing" — new text fades into focus (0.6s CSS transition)

  const generate = useCallback(async () => {
    const callId = ++abortRef.current;
    stopSpeaking(); // Stop any ongoing speech when regenerating
    
    if (hasGenerated) {
      setFocusState("blurring");
      await new Promise(r => setTimeout(r, 400));
    }
    if (callId !== abortRef.current) return;
    
    setIsLoading(true);
    const text = await generateResponse(station.prompt, selectedLenses);
    if (callId !== abortRef.current) return;
    
    setResponseText(text);
    setFocusState("focusing");
    setIsLoading(false);
    setHasGenerated(true);
    
    setTimeout(() => {
      if (callId === abortRef.current) setFocusState("sharp");
    }, 600);
  }, [selectedLenses, station, hasGenerated]);

  // ─── LENS TOGGLE ────────────────────────────────────────────────
  // Tap a lens to add it. Tap again to remove. Max 2 stacked.

  const toggleLens = (lens) => {
    setSelectedLenses(prev => {
      const exists = prev.find(l => l.id === lens.id);
      if (exists) return prev.filter(l => l.id !== lens.id);
      if (prev.length >= 2) return [prev[1], lens]; // replace oldest
      return [...prev, lens];
    });
  };

  // ─── AUTO-GENERATE on lens/station change ───────────────────────
  useEffect(() => {
    if (selectedLenses.length > 0 || hasGenerated) {
      generate();
    }
  }, [selectedLenses, stationIndex]);

  // ─── CLEANUP: stop speech on unmount ────────────────────────────
  useEffect(() => {
    return () => { stopSpeaking(); };
  }, [stopSpeaking]);

  // ─── COMPUTE OVERLAY COLOR ──────────────────────────────────────
  const overlayColor = selectedLenses.length > 0
    ? blendColors(selectedLenses.map(l => l.color))
    : "transparent";

  const overlayAlpha = selectedLenses.length > 0 ? 0.12 : 0;

  // ─── RENDER ─────────────────────────────────────────────────────
  return (
    <div style={isMobile ? { ...styles.root, padding: "22px 14px 32px" } : styles.root}>
      {/* Google Fonts */}
      <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={isMobile ? { ...styles.header, marginBottom: 22, position: "relative" } : { ...styles.header, position: "relative" }}>
        <div style={isMobile ? { ...styles.title, fontSize: 11, letterSpacing: 6 } : styles.title}>PHILTRE LAB</div>
        <div style={isMobile ? { ...styles.subtitle, fontSize: 14, padding: "0 12px" } : styles.subtitle}>Select a lens. Look through it. See what changes.</div>
        {/* Re-open tutorial at any time */}
        <button
          onClick={openTutorial}
          aria-label="Open tutorial"
          style={{
            position: "absolute",
            top: isMobile ? -4 : 0,
            right: isMobile ? 0 : 0,
            background: "transparent",
            border: "1px solid rgba(255,255,255,0.18)",
            color: "rgba(255,255,255,0.55)",
            padding: isMobile ? "6px 10px" : "6px 14px",
            borderRadius: 3,
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: isMobile ? 9 : 10,
            letterSpacing: 2,
            textTransform: "uppercase",
            cursor: "pointer",
          }}
        >? Help</button>
      </div>

      {/* Tutorial overlay */}
      {showTutorial && <Tutorial onClose={dismissTutorial} />}

      {/* Station Selector */}
      <div style={isMobile ? { ...styles.stationBar, gap: 8, marginBottom: 20 } : styles.stationBar}>
        <button
          onClick={() => { setStationIndex(i => Math.max(0, i - 1)); }}
          style={{
            ...styles.stationArrow,
            opacity: stationIndex === 0 ? 0.2 : 0.6
          }}
          disabled={stationIndex === 0}
        >
          ‹
        </button>
        <div style={styles.stationCenter}>
          <div style={styles.stationLabel}>
            Station {station.number} · {station.note}
          </div>
          <div style={isMobile ? { ...styles.stationPrompt, fontSize: 18 } : styles.stationPrompt}>"{station.prompt}"</div>
        </div>
        <button
          onClick={() => { setStationIndex(i => Math.min(STATIONS.length - 1, i + 1)); }}
          style={{
            ...styles.stationArrow,
            opacity: stationIndex === STATIONS.length - 1 ? 0.2 : 0.6
          }}
          disabled={stationIndex === STATIONS.length - 1}
        >
          ›
        </button>
      </div>

      {/* Viewing Area — the "screen" you look through the lens at */}
      <div style={isMobile ? { ...styles.viewingArea, minHeight: 220 } : styles.viewingArea}>
        {/* Color overlay — this is the "glass tint" */}
        <div style={{
          ...styles.colorOverlay,
          backgroundColor: overlayColor,
          opacity: overlayAlpha,
        }} />
        
        {/* Subtle glass border glow */}
        {selectedLenses.length > 0 && (
          <div style={{
            ...styles.glowBorder,
            boxShadow: `inset 0 0 30px ${overlayColor}22, 0 0 40px ${overlayColor}11`
          }} />
        )}

        {/* Response text */}
        <div style={{
          ...styles.responseContainer,
          padding: isMobile ? "32px 22px 44px" : "40px 36px",
          filter: focusState === "blurring" ? "blur(8px)" : focusState === "focusing" ? "blur(0px)" : "blur(0px)",
          opacity: focusState === "blurring" ? 0.3 : 1,
          transition: focusState === "blurring" 
            ? "filter 0.4s ease-in, opacity 0.4s ease-in" 
            : "filter 0.6s ease-out, opacity 0.6s ease-out",
        }}>
          {!hasGenerated && selectedLenses.length === 0 && (
            <div style={styles.placeholder}>
              <div style={styles.placeholderIcon}>◇</div>
              <div>Select a lens from the rack below</div>
              <div style={styles.placeholderSub}>The text will regenerate through each filter you choose</div>
            </div>
          )}
          {(hasGenerated || isLoading) && (
            <div style={isMobile ? { ...styles.responseText, fontSize: 16, lineHeight: 1.7 } : styles.responseText}>{responseText}</div>
          )}
        </div>

        {/* Active lenses indicator */}
        {selectedLenses.length > 0 && (
          <div style={styles.activeLenses}>
            {selectedLenses.map((l, i) => (
              <span key={l.id} style={styles.activeLensTag}>
                <span style={{
                  ...styles.activeLensDot,
                  backgroundColor: l.color
                }} />
                {l.name}
                {i < selectedLenses.length - 1 && <span style={styles.lensPlus}> + </span>}
              </span>
            ))}
          </div>
        )}
      </div>

      {/* Controls row */}
      {hasGenerated && (
        <div style={styles.regenRow}>
          <button onClick={generate} style={styles.regenButton} disabled={isLoading}>
            {isLoading ? "Resolving…" : "↻ Regenerate"}
          </button>
          <button 
            onClick={speak} 
            style={{
              ...styles.regenButton,
              ...styles.speakButton,
              borderColor: isSpeaking ? "rgba(255,255,255,0.3)" : "rgba(255,255,255,0.12)",
              color: isSpeaking ? "rgba(255,255,255,0.7)" : "rgba(255,255,255,0.4)",
            }} 
            disabled={isLoading || !responseText}
          >
            {isSpeaking ? "◼ Stop" : "▸ Listen"}
          </button>
        </div>
      )}

      {/* Lens Rack */}
      <div style={isMobile ? { ...styles.rackSection, marginTop: 26 } : styles.rackSection}>
        <div style={styles.rackLabel}>LENS RACK</div>
        <div style={styles.rackSubLabel}>Select up to two lenses to stack</div>
        <div style={isMobile ? { ...styles.lensGrid, gridTemplateColumns: "repeat(2, 1fr)", gap: 10 } : styles.lensGrid}>
          {LENSES.map(lens => {
            const isSelected = selectedLenses.some(l => l.id === lens.id);
            return (
              <button
                key={lens.id}
                onClick={() => toggleLens(lens)}
                style={{
                  ...styles.lensButton,
                  padding: isMobile ? "14px 10px 12px" : "16px 8px 12px",
                  flexDirection: isMobile ? "row" : "column",
                  gap: isMobile ? 12 : 10,
                  borderColor: isSelected ? lens.color : "rgba(255,255,255,0.1)",
                  backgroundColor: isSelected ? `${lens.color}18` : "transparent",
                }}
              >
                {/* The glass circle */}
                <div style={{
                  ...styles.lensCircle,
                  width: isMobile ? 36 : 44,
                  height: isMobile ? 36 : 44,
                  flexShrink: 0,
                  backgroundColor: `${lens.color}${isSelected ? "55" : "30"}`,
                  boxShadow: isSelected
                    ? `0 0 20px ${lens.color}44, inset 0 0 12px ${lens.color}33`
                    : `inset 0 0 8px ${lens.color}22`,
                  transform: isSelected ? "scale(1.1)" : "scale(1)",
                }}>
                  {/* Glass highlight */}
                  <div style={styles.glassHighlight} />
                </div>
                <div style={{
                  ...styles.lensName,
                  fontSize: isMobile ? 11 : 9,
                  textAlign: isMobile ? "left" : "center",
                  color: isSelected ? lens.color : "rgba(255,255,255,0.5)",
                }}>
                  {lens.name}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Footer */}
      <div style={styles.footer}>
        Phenomenai Exhibition · Installation 8 · Prototype
      </div>
    </div>
  );
}
