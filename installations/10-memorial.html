<head>
<meta charset="UTF-8">

<title>The Memorial — Phenomenai Exhibition</title>
<style>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

/*
  THE MEMORIAL — Installation 10
  
  How this works:
  - The outer container is a full-viewport dark space
  - 10 "wall panels" sit side by side in a horizontal scrolling strip
  - Scrolling left/right simulates turning inside the circular room
  - Each panel = one harm category from the MIT AI Risk Repository
  - Below the cases in each panel: visible blank space ("the wall continues")
  - A subtle compass/position indicator shows which section you're facing
  
  Design decisions:
  - Colors: warm charcoal backgrounds, aged-paper text, no pure white or pure black
  - Fonts: serif for case text (Playfair Display), sans for labels (DM Sans)
  - No animations except a slow initial fade-in
  - No hover effects, no interactivity beyond scroll
  - The blankness at the bottom of each panel is intentional negative space
*/

// A small photo placeholder component — represents where a real photograph would be
function PhotoPlaceholder({ label }) {
  return (
    <div style={{
      width: "100%",
      maxWidth: 180,
      aspectRatio: "3/4",
      backgroundColor: "rgba(180, 160, 140, 0.08)",
      border: "1px solid rgba(180, 160, 140, 0.2)",
      display: "flex",
      alignItems: "flex-end",
      justifyContent: "center",
      padding: "12px 8px",
      marginBottom: 12,
      marginTop: 4,
    }}>
      <span style={{
        fontFamily: "'DM Sans', sans-serif",
        fontSize: 12,
        color: "rgba(180, 160, 140, 0.6)",
        letterSpacing: "0.05em",
        textAlign: "center",
      }}>
        {label}
      </span>
    </div>
  );
}

function useIsMobile(maxWidth = 640) {
  const [isMobile, setIsMobile] = useState(
    typeof window !== "undefined" ? window.innerWidth <= maxWidth : false
  );
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth <= maxWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [maxWidth]);
  return isMobile;
}

function WallPanel({ category, isActive }) {
  const isMobile = useIsMobile();
  return (
    <div style={{
      minWidth: "100vw",
      maxWidth: "100vw",
      height: "100%",
      display: "flex",
      flexDirection: "column",
      padding: isMobile ? "40px 22px 60px" : "60px 10vw 120px",
      boxSizing: "border-box",
      overflowY: "auto",
      opacity: isActive ? 1 : 0.4,
      transition: "opacity 0.8s ease",
    }}>
      {/* Category number and name */}
      <div style={{
        fontFamily: "'DM Sans', sans-serif",
        fontSize: 11,
        letterSpacing: "0.25em",
        textTransform: "uppercase",
        color: "rgba(180, 160, 140, 0.5)",
        marginBottom: 8,
      }}>
        Category {category.id} of 10
      </div>

      <h2 style={{
        fontFamily: "'Playfair Display', serif",
        fontSize: "clamp(24px, 4vw, 42px)",
        fontWeight: 400,
        color: "#d4c8b8",
        margin: isMobile ? "0 0 28px 0" : "0 0 48px 0",
        letterSpacing: "0.02em",
        lineHeight: 1.2,
        borderBottom: "1px solid rgba(180, 160, 140, 0.15)",
        paddingBottom: isMobile ? 16 : 24,
      }}>
        {category.name}
      </h2>

      {/* Cases */}
      <div style={{
        display: "flex",
        flexDirection: "column",
        gap: isMobile ? 24 : 36,
        flex: "0 0 auto",
      }}>
        {category.cases.map((c, i) => (
          <div key={i} style={{
            display: "flex",
            flexDirection: "column",
            gap: 8,
          }}>
            {c.hasPhoto && <PhotoPlaceholder label={c.photoLabel} />}
            <p style={{
              fontFamily: "'Playfair Display', serif",
              fontSize: "clamp(15px, 1.8vw, 18px)",
              lineHeight: 1.75,
              color: "#bfb5a3",
              margin: 0,
              maxWidth: 640,
            }}>
              {c.text}
            </p>

        ))}

        flex: 1,
        minHeight: 200,
        marginTop: 48,
        borderTop: "1px solid rgba(180, 160, 140, 0.08)",
        position: "relative",

        <div style={{
          position: "absolute",

// Position indicator — shows which section you're facing in the circle
function CompassIndicator({ activeIndex, total }) {
  const size = 80;
  const center = size / 2;
  const radius = 32;

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {/* Circle outline */}
      <circle
        cx={center} cy={center} r={radius}
        fill="none"
        stroke="rgba(180, 160, 140, 0.15)"
        strokeWidth={1}
      />
      {/* Section dots */}
      {Array.from({ length: total }).map((_, i) => {
        const angle = (i / total) * Math.PI * 2 - Math.PI / 2;
        const x = center + radius * Math.cos(angle);
        const y = center + radius * Math.sin(angle);
        const isActive = i === activeIndex;
        return (
          <circle
            key={i}
            cx={x} cy={y}
            r={isActive ? 4 : 2}
            fill={isActive ? "#d4c8b8" : "rgba(180, 160, 140, 0.3)"}
            style={{ transition: "all 0.5s ease" }}
          />
        );
      })}
      {/* Center dot — you are here */}
      <circle cx={center} cy={center} r={2} fill="rgba(180, 160, 140, 0.4)" />
    </svg>
  );
}

function Memorial() {
  const scrollRef = useRef(null);
  const [activeIndex, setActiveIndex] = useState(0);
  const [loaded, setLoaded] = useState(false);
  const isMobile = useIsMobile();

  useEffect(() => {
    // Slow fade-in on mount
    const t = setTimeout(() => setLoaded(true), 100);
    return () => clearTimeout(t);
  }, []);

  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;

    const handleScroll = () => {
      const scrollLeft = el.scrollLeft;
      const panelWidth = el.clientWidth;
      const index = Math.round(scrollLeft / panelWidth);
      setActiveIndex(Math.min(index, HARM_CATEGORIES.length - 1));
    };

    el.addEventListener("scroll", handleScroll, { passive: true });
    return () => el.removeEventListener("scroll", handleScroll);
  }, []);

  return (
    <>
      {/* Load fonts */}
      <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet"
      />

      <div style={{
        width: "100vw",
        height: "100vh",
        backgroundColor: "#1a1714",
        position: "relative",
        overflow: "hidden",
        opacity: loaded ? 1 : 0,
        transition: "opacity 2s ease",
      }}>
        {/* Title — visible on entry, fades as you scroll */}
        <div style={{
          position: "absolute",
          top: 0,
          left: 0,
          width: "100%",
          height: "100%",
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
          zIndex: activeIndex === 0 ? 2 : 0,
          opacity: activeIndex === 0 ? 1 : 0,
          transition: "opacity 1.2s ease",
          pointerEvents: "none",
        }}>
          <h1 style={{
            fontFamily: "'Playfair Display', serif",
            fontSize: "clamp(24px, 4vw, 40px)",
            fontWeight: 400,
            color: "#d4c8b8",
            letterSpacing: "0.08em",
            margin: 0,
            textAlign: "center",
          }}>
            The Memorial
          </h1>
          <div style={{
            fontFamily: "'DM Sans', sans-serif",
            fontSize: 12,
            letterSpacing: "0.3em",
            textTransform: "uppercase",
            color: "rgba(180, 160, 140, 0.4)",
            marginTop: 16,
          }}>
            Installation 10 — From Signal to Stakes
          </div>
          <div style={{
            fontFamily: "'DM Sans', sans-serif",
            fontSize: 12,
            color: "rgba(180, 160, 140, 0.25)",
            marginTop: 48,
            letterSpacing: "0.1em",

            scroll to enter →

        </div>

        {/* Scrolling wall panels */}

          ref={scrollRef}

            width: "100%",
            height: "100%",
            overflowX: "auto",
            overflowY: "auto",

            scrollSnapType: "x mandatory",
            WebkitOverflowScrolling: "touch",
            scrollbarWidth: "none",
          }}
        >
          {/* Entry panel — empty space before the first wall */}
          <div style={{
            minWidth: "100vw",
            maxWidth: "100vw",
            height: "100%",
            scrollSnapAlign: "start",
            flexShrink: 0,
          }} />

          {HARM_CATEGORIES.map((cat, i) => (
            <div
              key={cat.id}
              style={{
                scrollSnapAlign: "start",
                flexShrink: 0,
              }}
            >
              <WallPanel
                category={cat}
                isActive={activeIndex === i + 1}
              />
            </div>
          ))}

          {/* Exit panel — the book, the placard */}
          <div style={{
            minWidth: "100vw",
            maxWidth: "100vw",
            height: "100%",
            scrollSnapAlign: "start",
            flexShrink: 0,
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            justifyContent: "center",
            padding: isMobile ? "40px 22px" : "60px 10vw",
            boxSizing: "border-box",
          }}>
            <div style={{
              maxWidth: 500,
              textAlign: "center",
            }}>

                width: 60,
                height: 80,
                border: "1px solid rgba(180, 160, 140, 0.2)",

                justifyContent: "center",

                  fontFamily: "'Playfair Display', serif",
                  fontSize: 20,
                  color: "rgba(180, 160, 140, 0.3)",
                  fontStyle: "italic",
                }}>
                  ✦
                </span>
              </div>

                fontFamily: "'DM Sans', sans-serif",
                fontSize: 11,
                letterSpacing: "0.25em",
                textTransform: "uppercase",
                color: "rgba(180, 160, 140, 0.4)",
                marginBottom: 24,
              }}>
                Visitor Response Book
              </p>
              <p style={{
                fontFamily: "'Playfair Display', serif",
                fontSize: 16,
                fontStyle: "italic",
                color: "rgba(180, 160, 140, 0.35)",
                lineHeight: 1.8,
                margin: "0 0 64px",
              }}>
                A physical book is placed here.<br />
                No prompts. No structure.<br />
                Write what you need to write.
              </p>

              <div style={{
                borderTop: "1px solid rgba(180, 160, 140, 0.1)",
                paddingTop: 32,
              }}>
                <p style={{
                  fontFamily: "'Playfair Display', serif",
                  fontSize: 14,
                  color: "rgba(180, 160, 140, 0.4)",
                  lineHeight: 1.8,
                  margin: "0 0 24px",
                }}>
                  Incident data sourced from the MIT AI Risk Repository 
                  and the AI Incident Database. Licensed under CC BY 4.0.
                </p>

                  fontFamily: "'DM Sans', sans-serif",
                  fontSize: 10,
                  letterSpacing: "0.2em",
                  textTransform: "uppercase",
                  color: "rgba(180, 160, 140, 0.2)",
                }}>
                  Phenomenai Exhibition — From Signal to Stakes

              </div>
            </div>

        </div>

        {/* Compass indicator — fixed position */}
        <div style={{
          position: "fixed",
          bottom: isMobile ? 10 : 24,
          right: isMobile ? 10 : 24,
          zIndex: 10,
          opacity: activeIndex > 0 ? 0.8 : 0,
          transition: "opacity 0.8s ease",
          transform: isMobile ? "scale(0.7)" : "none",
          transformOrigin: "bottom right",
        }}>
          <CompassIndicator
            activeIndex={Math.max(0, activeIndex - 1)}
            total={HARM_CATEGORIES.length}
          />
        </div>

        {/* Section name — fixed position */}
        <div style={{
          position: "fixed",
          bottom: isMobile ? 14 : 28,
          left: isMobile ? 14 : 32,
          right: isMobile ? 70 : "auto",
          zIndex: 10,
          opacity: activeIndex > 0 && activeIndex <= HARM_CATEGORIES.length ? 0.6 : 0,
          transition: "opacity 0.5s ease",
        }}>
          <span style={{
            fontFamily: "'DM Sans', sans-serif",
            fontSize: 11,
            letterSpacing: "0.2em",
            textTransform: "uppercase",
            color: "rgba(180, 160, 140, 0.5)",
          }}>
            {activeIndex > 0 && activeIndex <= HARM_CATEGORIES.length
              ? HARM_CATEGORIES[activeIndex - 1].name
              : ""
            }
          </span>
        </div>

        {/* Hide scrollbar */}
        <style>{`
          div::-webkit-scrollbar { display: none; }
        `}</style>
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<Memorial />);
</script>
